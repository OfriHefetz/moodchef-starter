<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MoodChef AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>MoodChef AI</h1>

    <p class="tagline">
      Tell us your mood, and we will suggest what to eat.
    </p>

    <section>
      <h2>Current recommendations</h2>

      <ul class="recommendations">
        <li><strong>Happy</strong> → Pizza</li>
        <li><strong>Tired</strong> → Soup</li>
        <li><strong>Stressed</strong> → Chocolate</li>
      </ul>
    </section>

    <section class="challenge-box">
      <h2>Your challenge</h2>
      <p>
        Change the app name, add new mood recommendations,
        improve the design, and save each meaningful change with Git.
      </p>
    </section>
  </main>
</body>
</html>
